  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    .hbtn:hover{border-color:var(--blue);color:var(--bright);transform:translateY(-1px)}
    .hbtn.danger:hover{border-color:var(--red);color:#ff8a8a;background:rgba(239,68,68,.08)}

    aside,#codePanel{background:var(--panel);border-color:var(--line);min-width:0;display:flex;flex-direction:column}
aside{position:relative;min-height:0;overflow:hidden}
    aside{border-right:1px solid var(--line)}
aside.deleteTarget{outline:2px dashed var(--red);outline-offset:-8px;background:linear-gradient(180deg,rgba(239,68,68,.12),var(--panel))} aside.deleteTarget:after{content:attr(data-delete-text);position:absolute;left:14px;right:14px;bottom:14px;text-align:center;color:#ff9a9a;border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.12);border-radius:12px;padding:10px;font-weight:950;font-size:12px;pointer-events:none}
    #codePanel{border-left:1px solid var(--line);position:relative;z-index:6}
    .vResize{background:var(--line);cursor:col-resize;position:relative;z-index:8}.vResize:hover,.vResize.active{background:var(--blue)}.vResize:after{content:'';position:absolute;top:50%;left:50%;width:2px;height:42px;border-radius:2px;background:rgba(255,255,255,.22);transform:translate(-50%,-50%)}
    #tabResize{height:6px;flex-shrink:0;background:var(--line);cursor:row-resize;position:relative}#tabResize:hover,#tabResize.active{background:var(--blue)}#tabResize:after{content:'';position:absolute;left:50%;top:50%;width:42px;height:2px;border-radius:2px;background:rgba(255,255,255,.22);transform:translate(-50%,-50%)}
    .tabs{height:58px;flex-shrink:0;display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;padding:8px;border-bottom:1px solid var(--line);overflow-y:auto;overflow-x:hidden;background:var(--panel2);scrollbar-width:thin;scrollbar-color:var(--muted) transparent}.tabs::-webkit-scrollbar{width:6px}.tabs::-webkit-scrollbar-track{background:transparent}.tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}.tabs:hover::-webkit-scrollbar-thumb{background:var(--muted)}
    .tab{width:48px;height:48px;flex:0 0 48px;border:0;background:transparent;color:var(--muted);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:950;transition:.15s;position:relative}
    .tab .ico{font-size:17px;filter:grayscale(.35);transition:.15s}.tab:hover,.tab.active{color:var(--bright);background:rgba(255,255,255,.045)}.tab.active:after{content:"";position:absolute;bottom:3px;width:22px;height:3px;background:var(--cat);border-radius:3px}.tab.active .ico{filter:none}
    #palette{padding:12px;overflow:auto;min-height:0;flex:1;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--line) transparent}#palette::-webkit-scrollbar{width:6px}#palette::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}
    .catTitle{display:flex;align-items:center;gap:8px;color:var(--cat);text-transform:uppercase;font-size:12px;font-weight:950;letter-spacing:.1em;margin:4px 2px 12px}
    .tool{display:flex;align-items:center;gap:9px;width:100%;background:linear-gradient(180deg,var(--panel2),#0f1428);border:1px solid var(--line);border-left:4px solid var(--cat);color:var(--bright);border-radius:11px;padding:10px 11px;margin-bottom:8px;cursor:grab;user-select:none;box-shadow:0 5px 18px rgba(0,0,0,.14);transition:.15s}
    .tool:hover{border-color:var(--cat);transform:translateX(3px);background:var(--panel3)}.tool:active{cursor:grabbing}
    .tool .name{font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;font-weight:800}.tool .desc{display:block;color:var(--muted);font-family:inherit;font-weight:700;font-size:10px;margin-top:2px}.tool.valueTool{border-radius:999px;width:max-content;max-width:100%;padding:9px 12px}.tool.valueTool .desc{display:none}
    .specialBtn{border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.035);color:var(--bright);border-radius:12px;padding:11px;margin-bottom:12px;cursor:pointer;font-weight:900;width:100%;text-align:left}.specialBtn:hover{border-color:var(--cat);background:rgba(255,255,255,.06)}
    .chipRow{display:flex;align-items:center;gap:7px;margin:6px 0;padding:4px 2px}.chip{display:inline-flex;align-items:center;border-radius:999px;background:var(--blue);color:white;padding:4px 9px;font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;font-weight:800}.kind{font-family:"JetBrains Mono",Consolas,monospace;font-size:10px;color:var(--yellow);border:1px solid rgba(251,191,36,.25);border-radius:999px;padding:2px 6px;background:rgba(251,191,36,.08)}

    main{min-width:0;display:flex;flex-direction:column;background:radial-gradient(circle at 20% 15%,rgba(61,111,255,.12),transparent 28%),var(--bg);overflow:visible;position:relative}
    .workspaceTop{height:42px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line);background:rgba(13,17,34,.8);backdrop-filter:blur(10px);white-space:nowrap;overflow:visible;min-width:max-content;position:relative;z-index:1}.workspaceTop>*{flex-shrink:0}
    .workspaceTop h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
    .count{border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;color:var(--muted)}
    .hint{margin-left:auto;color:var(--dim);font-size:12px;font-weight:700}.hint.hidden{display:none}.hintClose{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:7px;width:23px;height:23px;cursor:pointer;font-weight:950;line-height:1}.hintClose:hover{border-color:var(--red);color:var(--red)}.kbd{border:1px solid var(--line);background:var(--panel2);border-radius:5px;padding:2px 5px;color:var(--muted);font-family:Consolas,monospace;font-size:11px}
    #workspace{position:relative;flex:1;overflow:hidden;background-image:radial-gradient(circle,#202949 1px,transparent 1px);background-size:24px 24px;cursor:grab;touch-action:none}
    #workspace.panning{cursor:grabbing}
    .canvas{position:absolute;left:0;top:0;width:1200px;min-height:1600px;padding:28px 28px 180px;transform-origin:0 0;will-change:transform}
    .viewControls{display:flex;align-items:center;gap:6px;margin-left:8px}.zoomBadge{min-width:46px;text-align:center;color:var(--muted);font-family:Consolas,monospace;font-size:11px;font-weight:900;border:1px solid var(--line);background:var(--panel2);border-radius:7px;padding:4px 6px}.iconBtn{width:28px;height:28px;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:8px;cursor:pointer;font-weight:950}.iconBtn:hover{border-color:var(--blue);color:var(--bright)}
    .empty{height:230px;border:2px dashed rgba(61,111,255,.28);border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);background:rgba(13,17,34,.45)}.empty strong{font-size:18px;color:var(--bright)}
    .dropzone{height:16px;border-radius:8px;margin:1px 0;transition:.12s;position:relative}.dropzone.dragover{height:42px;border:2px dashed var(--blue);background:rgba(61,111,255,.08)}
    .block{position:relative;display:table;width:max-content;min-width:330px;max-width:none;border:1px solid color-mix(in srgb,var(--bc) 35%,var(--line));background:linear-gradient(180deg,#11172d,#0c1020);border-radius:12px;margin:0 0 0 0;box-shadow:0 12px 32px rgba(0,0,0,.18);overflow:hidden}.block.dragging{opacity:.35}.block:before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:var(--bc)}
    .blockHead{min-height:46px;display:flex;align-items:center;gap:7px;padding:8px 12px 8px 14px}.handle{color:var(--dim);cursor:grab;font-size:16px}.codeMini{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;white-space:nowrap;font-family:"JetBrains Mono",Consolas,monospace;font-size:13px;color:#E5E5E5;line-height:1.8;flex:1}.tok-kw{color:#C678DD}.tok-prop,.tok-var{color:#E5E5E5}.tok-fn{color:#61AFEF}.tok-pun,.tok-op{color:#56B6C2}.tok-str{color:#98C379}.tok-num{color:#E06C75}.tok-bool{color:#D19A66}.tok-null{color:#D19A66}.tok-class{color:#E5C07B}.tok-cmt{color:#5C6370}.blockActions{display:flex;gap:5px}.miniBtn{border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:7px;width:25px;height:25px;cursor:pointer;font-weight:900}.miniBtn:hover{border-color:var(--bc);color:var(--bright)}
    .inp,.sel{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:7px;color:#c3e88d;font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;padding:4px 7px;outline:0;min-width:66px;max-width:none}.sel{color:#ff9d6c;cursor:pointer}.inp:focus,.sel:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,111,255,.14)}
    .valueBlock{display:inline-flex;align-items:center;gap:5px;border:1px solid color-mix(in srgb,var(--bc,var(--blue)) 40%,var(--line));background:rgba(61,111,255,.07);border-radius:9px;padding:4px 6px;white-space:nowrap}.valueBlock.obj{background:rgba(167,139,250,.09)}.valueBlock.list{background:rgba(34,197,94,.09)}.valueItem{display:inline-flex;align-items:center;gap:4px}.keyInput{min-width:54px;color:#82aaff}.valueDrop{display:inline-flex;align-items:center;min-width:52px;border-radius:7px}.valueDrop.dragOver{outline:2px dashed var(--blue);outline-offset:2px}.valueAdd{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-weight:950}.valueAdd:hover{border-color:var(--blue);color:var(--bright)}.returnWrap{display:inline-flex;align-items:center;gap:4px}.returnSelect{width:auto;min-width:92px;padding:4px 8px;text-align:center;color:var(--muted);font-size:11px;border-color:var(--blue);background:var(--panel2)}
    .body{margin:0 12px 12px 30px;border-left:2px solid color-mix(in srgb,var(--bc) 45%,transparent);border-bottom:2px solid color-mix(in srgb,var(--bc) 35%,transparent);border-radius:0 0 0 10px;padding:8px 0 8px 16px;min-height:54px;min-width:300px}.body .dropzone{margin-right:10px}.bodyEmpty{color:var(--dim);font-size:12px;font-weight:800;padding:10px 0 12px}.closeBrace{font-family:"JetBrains Mono",Consolas,monospace;color:#6f7dac;padding:0 0 10px 28px;font-size:14px}

    .codeTop{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);background:var(--panel2)}.codeTop .label{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.1em}.badge{background:rgba(61,111,255,.15);border:1px solid rgba(61,111,255,.35);color:#9eb6ff;border-radius:6px;padding:2px 6px;font-family:Consolas,monospace}
    #code{flex:1;overflow:auto;padding:14px 0 22px;background:#080b16;scrollbar-width:none;overscroll-behavior:contain}#code::-webkit-scrollbar{display:none}.line{display:grid;grid-template-columns:34px max-content;column-gap:18px;white-space:pre;font-family:"JetBrains Mono",Consolas,monospace;font-size:12.5px;line-height:1.9}.codeText{white-space:pre;min-width:max-content}#code.wrap .line{grid-template-columns:34px minmax(0,1fr);width:100%;white-space:normal}.ln{display:block;width:34px;text-align:right;color:#334061;user-select:none}.codeText{display:block}#code.wrap .codeText{white-space:pre-wrap;overflow-wrap:anywhere;min-width:0}.cmt{color:#5C6370;font-style:italic}.kw{color:#C678DD}.prop,.var{color:#E5E5E5}.fn{color:#61AFEF}.str{color:#98C379}.num{color:#E06C75}.pun,.op{color:#56B6C2}.bool{color:#D19A66}.nul{color:#D19A66}.cls{color:#E5C07B}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50}.box{width:min(360px,calc(100vw - 30px));background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 26px 80px rgba(0,0,0,.65)}.box h3{color:var(--bright);margin-bottom:14px}.field{display:flex;flex-direction:column;gap:6px;margin:10px 0}.field label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:950}.field input{background:var(--panel3);border:1px solid var(--line);border-radius:10px;color:var(--bright);padding:10px;font-family:Consolas,monospace;outline:0}.seg{display:flex;gap:7px}.seg button{flex:1;border:1px solid var(--line);background:var(--panel3);color:var(--muted);border-radius:10px;padding:9px;cursor:pointer;font-weight:900}.seg button.active{background:var(--blue);border-color:var(--blue);color:white}.boxFoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.err{display:none;color:#ff8181;font-size:12px;font-weight:800;margin-top:8px}
    @media(max-width:1050px){#app{--leftW:230px;--codeW:320px}.hint{display:none}}@media(max-width:820px){#app{grid-template-columns:1fr}.vResize,aside,#codePanel{display:none}}
  </style>
</head>
<body>
  <header>
    <div class="logo">Bloxd<b>Blocks</b> Studio</div>
    <div class="tag">Éditeur visuel JavaScript</div>
    <div class="header-actions">
      <button class="hbtn" id="langToggle">🇬🇧 EN</button>
      <button class="hbtn" id="themeToggle">☀️ Clair</button>

      <button class="hbtn" id="loadBtn">↩ Charger</button>
      <button class="hbtn danger" id="clearBtn">Tout effacer</button>
    </div>

  <div id="app">
    <aside>
      <div class="tabs" id="tabs"></div>
      <div id="tabResize" title="Resize category selector"></div>
      <div id="palette"></div>

    <div class="vResize" id="leftResize" title="Resize category panel"></div>

      <div class="workspaceTop"><h2>Workspace</h2><span class="count" id="count">0 bloc</span><div class="viewControls"><button class="iconBtn" id="zoomOut">−</button><span class="zoomBadge" id="zoomLabel">100%</span><button class="iconBtn" id="zoomIn">+</button><button class="iconBtn" id="resetView" title="Réinitialiser la vue">⌂</button></div><span class="hint"><span class="kbd">Molette</span> déplacer · <span class="kbd">Ctrl + molette</span> zoom · <span class="kbd">Espace + glisser</span> naviguer</span><button class="hintClose" id="hintClose" title="Masquer l’aide">×</button></div>
      <div id="workspace"><div class="canvas" id="canvas"></div></div>

      <pre id="code"></pre>
    </section>
  </div>

function findParentFuncName(targetId,list=blocks,current=null){
  for(const b of list){
    const nextCurrent=b.type==='func'?String(b.params?.[0]||'').trim():current;
    if(b.id===targetId)return current;
    if(b.children){const r=findParentFuncName(targetId,b.children,nextCurrent);if(r!==null&&r!==undefined)return r;}
  }
  return null;
}
function nearestFuncBefore(targetId,list=blocks,last=null){
  for(const b of list){
    if(b.id===targetId)return last;
    const nextLast=b.type==='func'?String(b.params?.[0]||'').trim():last;
    if(b.children){const r=nearestFuncBefore(targetId,b.children,nextLast);if(r!==null&&r!==undefined)return r;}
    last=nextLast;
  }
  return null;
}
function allReturnSuggestions(){return [...new Set(Object.values(RETURN_OPTIONS).flat())];}
function returnOptionsForBlock(b){
  const fn=(findParentFuncName(b.id)||nearestFuncBefore(b.id)||'').trim();
  if(fn&&RETURN_OPTIONS[fn])return RETURN_OPTIONS[fn];
  return fn?[]:allReturnSuggestions();
}

function entitySettingOptions(setting){
  setting=unq(setting);

  if(['canAttack','canSee','hasPriorityNametag','showDamageAmounts'].includes(setting))return [choiceVal('true'),choiceVal('false')];
  if(['opacity','zIndex'].includes(setting))return [];

}
function entitySettingDefault(setting){
  setting=unq(setting);
  if(['nameColour','colorInLobbyLeaderboard','killfeedColour'].includes(setting))return '"default"';
  if(['canAttack','canSee','showDamageAmounts'].includes(setting))return 'true';
  if(setting==='hasPriorityNametag')return 'false';

function normalizeDependentChoices(b,changedVal){

}

function renderAll(){renderWorkspace();renderCode();renderPalette()}
function openVarModal(){modal('Nouvelle variable',box=>{box.innerHTML+=`<div class="field"><label>Nom</label><input id="mName" placeholder="maVariable"></div><div class="field"><label>Type</label><div class="seg"><button class="active">let</button><button>const</button><button>var</button></div></div><div class="err"></div>`;let kind='let';box.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{kind=b.textContent;box.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));b.classList.add('active')});return()=>{let n=box.querySelector('#mName').value.trim(),err=box.querySelector('.err');if(!isVarTarget(n)){err.textContent='Nom invalide';err.style.display='block';return false}vars.push({name:n,kind});return true}})}
function openFnModal(){modal('Nouvelle fonction',box=>{box.innerHTML+=`<div class="field"><label>Nom</label><input id="mName" placeholder="maFonction"></div><div class="field"><label>Paramètres, séparés par des virgules</label><input id="mParams" placeholder="playerId, score"></div><div class="err"></div>`;return()=>{let n=box.querySelector('#mName').value.trim(),p=box.querySelector('#mParams').value.split(',').map(x=>x.trim()).filter(Boolean),err=box.querySelector('.err');if(!/^[a-zA-Z_$][\w$]*$/.test(n)){err.textContent='Nom invalide';err.style.display='block';return false}customFns.push({name:n,params:p});return true}})}
function modal(title,content){let m=document.createElement('div');m.className='modal';let b=document.createElement('div');b.className='box';b.innerHTML=`<h3>${title}</h3>`;let validate=content(b);let foot=document.createElement('div');foot.className='boxFoot';foot.innerHTML='<button class="hbtn">Annuler</button><button class="hbtn">Créer</button>';foot.children[0].onclick=()=>m.remove();foot.children[1].onclick=()=>{if(validate()){m.remove();renderAll()}};b.append(foot);m.append(b);document.body.append(m);setTimeout(()=>b.querySelector('input')?.focus())}

let view={x:80,y:50,scale:1},spaceDown=false,panStart=null;
function applyView(){
  canvas.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.scale})`;
  const grid=24*view.scale;
  workspace.style.backgroundSize=`${grid}px ${grid}px`;
  workspace.style.backgroundPosition=`${view.x%grid}px ${view.y%grid}px`;
  $('#zoomLabel').textContent=Math.round(view.scale*100)+'%';
}
function zoomAt(factor,cx,cy){
  const r=workspace.getBoundingClientRect(), old=view.scale;
  const wx=(cx-r.left-view.x)/old, wy=(cy-r.top-view.y)/old;
  view.scale=Math.max(.35,Math.min(2.2,old*factor));
  view.x=cx-r.left-wx*view.scale; view.y=cy-r.top-wy*view.scale;
  applyView();
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){if(e.target.closest?.('input,textarea,select,[contenteditable="true"]'))return;spaceDown=true;workspace.style.cursor='grab';e.preventDefault()}});
document.addEventListener('keyup',e=>{if(e.code==='Space')spaceDown=false});
workspace.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){zoomAt(e.deltaY<0?1.1:.9,e.clientX,e.clientY)}
  else {view.x-=e.deltaX; view.y-=e.deltaY; applyView()}
},{passive:false});
workspace.addEventListener('mousedown',e=>{
  if(e.target.closest('.block,.dropzone,input,select,button'))return;
  if(e.button===0||e.button===1||e.button===2||spaceDown){e.preventDefault();panStart={mx:e.clientX,my:e.clientY,x:view.x,y:view.y};workspace.classList.add('panning')}
});
document.addEventListener('mousemove',e=>{if(!panStart)return;view.x=panStart.x+e.clientX-panStart.mx;view.y=panStart.y+e.clientY-panStart.my;applyView()});
document.addEventListener('mouseup',()=>{if(panStart){panStart=null;workspace.classList.remove('panning')}});
workspace.addEventListener('contextmenu',e=>e.preventDefault());
$('#zoomIn').onclick=()=>zoomAt(1.15,workspace.getBoundingClientRect().left+workspace.clientWidth/2,workspace.getBoundingClientRect().top+workspace.clientHeight/2);
$('#zoomOut').onclick=()=>zoomAt(.85,workspace.getBoundingClientRect().left+workspace.clientWidth/2,workspace.getBoundingClientRect().top+workspace.clientHeight/2);
$('#resetView').onclick=()=>{view={x:80,y:50,scale:1};applyView()};
applyView();


function setupResizers(){
  const app=$('#app'), tabsEl=$('#tabs');
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
  let st=null;
  const start=(e,type)=>{if(e.button!==0)return;e.preventDefault();st={type,x:e.clientX,y:e.clientY,left:parseInt(getComputedStyle(app).getPropertyValue('--leftW'))||270,code:parseInt(getComputedStyle(app).getPropertyValue('--codeW'))||360,tabs:tabsEl.offsetHeight};document.body.style.cursor=type==='tabs'?'row-resize':'col-resize';document.body.style.userSelect='none';e.currentTarget.classList.add('active')};
  $('#leftResize').addEventListener('mousedown',e=>start(e,'left'));
  $('#codeResize').addEventListener('mousedown',e=>start(e,'code'));
  $('#tabResize').addEventListener('mousedown',e=>start(e,'tabs'));
  document.addEventListener('mousemove',e=>{if(!st)return;if(st.type==='left'){app.style.setProperty('--leftW',clamp(st.left+e.clientX-st.x,120,520)+'px')}else if(st.type==='code'){app.style.setProperty('--codeW',clamp(st.code-(e.clientX-st.x),0,720)+'px')}else{tabsEl.style.height=clamp(st.tabs+e.clientY-st.y,0,220)+'px'}});
  document.addEventListener('mouseup',()=>{if(!st)return;document.body.style.cursor='';document.body.style.userSelect='';document.querySelectorAll('.active').forEach(x=>x.classList.remove('active'));st=null});
}
setupResizers();
palette.addEventListener('wheel',e=>{e.stopPropagation()},{passive:true});
tabs.addEventListener('wheel',e=>{e.stopPropagation()},{passive:true});
code.addEventListener('wheel',e=>{e.preventDefault();e.stopPropagation();code.scrollTop+=e.deltaY;code.scrollLeft+=e.deltaX},{passive:false});

$('#wrapBtn').onclick=()=>{codeWrap=!codeWrap;localStorage.setItem('bloxd-code-wrap',codeWrap?'1':'0');applyCodeWrap()};
$('#copyBtn').onclick=async()=>{let txt=genCode();if(!txt.trim())return;await navigator.clipboard?.writeText(txt).catch(()=>{});$('#copyBtn').textContent=tr('copied');setTimeout(()=>$('#copyBtn').textContent=tr('copy'),1300)};
$('#langToggle').onclick=()=>{lang=lang==='fr'?'en':'fr';localStorage.setItem('bloxd-lang',lang);applyLangStatic();applyTheme();renderAll()};
$('#themeToggle').onclick=()=>{theme=theme==='dark'?'light':'dark';localStorage.setItem('bloxd-theme',theme);applyTheme()};
$('#hintClose').onclick=()=>{document.querySelector('.hint').classList.add('hidden');$('#hintClose').style.display='none'};
$('#clearBtn').onclick=()=>{if(confirm(tr('clearConfirm'))){blocks=[];renderAll()}};$('#saveBtn').onclick=()=>{localStorage.setItem('bloxd-blocks-studio',JSON.stringify({blocks,vars,customFns,uid}));alert(tr('saved'))};$('#loadBtn').onclick=()=>{let s=localStorage.getItem('bloxd-blocks-studio');if(s){Object.assign(window,JSON.parse(s));let data=JSON.parse(s);blocks=data.blocks||[];vars=data.vars||[];customFns=data.customFns||[];uid=data.uid||1;renderAll()}};
function dropNewBlockAtEnd(e){if(e.defaultPrevented)return;e.preventDefault();let type=e.dataTransfer.getData('application/x-block-type')||e.dataTransfer.getData('text/plain');if(type&&defs[type]&&!defs[type].valueOnly)insertAt(null,blocks.length,makeBlock(type,e.dataTransfer.getData('application/x-fn-name'),JSON.parse(e.dataTransfer.getData('application/x-fn-args')||'[]')))}
canvas.ondragover=e=>e.preventDefault();canvas.ondrop=dropNewBlockAtEnd;workspace.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('application/x-block-type'))e.preventDefault()});workspace.addEventListener('drop',dropNewBlockAtEnd);
sidebar.ondragover=e=>{if(e.dataTransfer.types.includes('application/x-block-id')){e.preventDefault();sidebar.classList.add('deleteTarget')}};
sidebar.ondragleave=e=>{if(!sidebar.contains(e.relatedTarget))sidebar.classList.remove('deleteTarget')};
sidebar.ondrop=e=>{let bid=e.dataTransfer.getData('application/x-block-id');if(bid){e.preventDefault();removeBlock(bid);sidebar.classList.remove('deleteTarget');renderAll()}};
applyLangStatic();applyTheme();applyCodeWrap();renderTabs();renderAll();
</script>
</body>
</html>
